<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | PruebaSaber</title>
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <h1>PruebaSaber</h1>
            <p class="subtitle">Sistema de gestión y seguimiento Saber Pro y TyT</p>

            <div th:if="${param.error}" class="alert error">
                Usuario o contraseña incorrectos.
            </div>

            <div th:if="${param.logout}" class="alert success">
                Has cerrado sesión correctamente.
            </div>

            <form th:action="@{/login}" method="post" class="login-form">
                <div class="form-group">
                    <label for="email">Correo institucional</label>
                    <input type="email" id="email" name="email"
                           placeholder="correo@institucion.edu.co" required>
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password"
                           placeholder="Ingresa tu contraseña" required>
                </div>

                <button type="submit" class="btn-login">Iniciar sesión</button>
            </form>
        </div>
    </div>
</body>
</html>
