<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${titulo}">Informe de Beneficios</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app-theme.css}">
    <link rel="stylesheet" th:href="@{/css/estudiantes.css}">
</head>
<body class="bg-light">

<div class="container py-4 page-max">

    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
        <div class="d-flex align-items-center gap-3">
            <div class="app-icon-circle">
                <i class="bi bi-gift-fill fs-4"></i>
            </div>
            <div>
                <h1 class="h3 mb-1">Informe de Beneficios</h1>
                <p class="text-muted mb-0">Consulta de estudiantes con beneficio académico aplicable.</p>
            </div>
        </div>

        <a th:href="@{/dashboard/docente}" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left"></i> Volver al panel
        </a>
    </div>

    <div class="row g-3 mb-4">
        <div class="col-md-4">
            <div class="card border-0 shadow-sm app-stat-card">
                <div class="card-body">
                    <small class="text-muted d-block">Total beneficiados</small>
                    <h3 class="mb-0" th:text="${totalBeneficiados}">0</h3>
                </div>
            </div>
        </div>
    </div>

    <section class="card shadow-sm border-0">
        <div class="card-body">
            <div class="d-flex align-items-center gap-2 mb-3">
                <i class="bi bi-table section-title-icon"></i>
                <h2 class="h5 mb-0">Listado de beneficios</h2>
            </div>

            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-light">
                    <tr>
                        <th>Documento</th>
                        <th>Estudiante</th>
                        <th>Periodo</th>
                        <th>Puntaje global</th>
                        <th>Rango</th>
                        <th>Beca</th>
                        <th class="text-center">Detalle</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${#lists.isEmpty(beneficios)}">
                        <td colspan="7" class="text-center text-muted py-4">
                            No hay beneficios académicos aplicables.
                        </td>
                    </tr>

                    <tr th:each="fila : ${beneficios}">
                        <td th:text="${fila.estudiante != null ? fila.estudiante.numeroDocumento : '-'}">123</td>
                        <td th:text="${fila.estudiante != null ? ((fila.estudiante.primerNombre != null ? fila.estudiante.primerNombre : '') + ' ' + (fila.estudiante.primerApellido != null ? fila.estudiante.primerApellido : '')).trim() : 'Sin estudiante'}">Nombre</td>
                        <td th:text="${fila.resultado != null && fila.resultado.periodo != null ? fila.resultado.periodo : '-'}">2026-1</td>
                        <td th:text="${fila.resultado != null && fila.resultado.puntajeGlobal != null ? fila.resultado.puntajeGlobal : '-'}">0</td>
                        <td th:text="${fila.beneficio != null ? fila.beneficio.rango : '-'}">241 o más</td>
                        <td>
                            <span class="badge bg-success"
                                  th:text="${fila.beneficio != null ? fila.beneficio.porcentajeBeca : '-'}">100%</span>
                        </td>
                        <td class="text-center">
                            <a th:if="${fila.estudiante != null}"
                               th:href="@{/estudiantes/detalle/{id}(id=${fila.estudiante.id})}"
                               class="btn btn-sm btn-outline-primary">
                                <i class="bi bi-eye"></i> Ver estudiante
                            </a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </section>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
