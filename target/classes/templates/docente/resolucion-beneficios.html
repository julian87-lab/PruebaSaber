<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${titulo}">Resolución de Beneficios</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app-theme.css}">
</head>
<body class="bg-light">

<div class="container py-4 page-max">
    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
        <div class="d-flex align-items-center gap-3">
            <div class="app-icon-circle">
                <i class="bi bi-file-earmark-pdf-fill fs-4"></i>
            </div>
            <div>
                <h1 class="h3 mb-1">Resolución de Beneficios</h1>
                <p class="text-muted mb-0">Consulta del documento institucional de estímulos y beneficios.</p>
            </div>
        </div>

        <a th:href="@{/dashboard/docente}" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left"></i> Volver al panel
        </a>
    </div>

    <section class="card shadow-sm border-0">
        <div class="card-body">
            <h2 class="h5 mb-3">Documento oficial</h2>
            <p class="text-muted">
                Aquí puedes consultar la resolución institucional asociada a los beneficios académicos.
            </p>

            <div class="d-flex flex-wrap gap-2">
                <a th:href="@{'/docs/' + ${nombrePdf}}" target="_blank" class="btn btn-primary">
                    <i class="bi bi-file-earmark-pdf"></i> Abrir PDF
                </a>
            </div>
        </div>
    </section>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
